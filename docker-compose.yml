services:
  postgres:
    image: postgres:16-alpine
    container_name: room-booking-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-roomuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-roompass}
      POSTGRES_DB: ${DB_NAME:-roomdb}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./internal/db/migrations:/migrations:ro 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-roomuser} -d ${DB_NAME:-roomdb}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - room-booking-network
  migrate:
    image: migrate/migrate:latest
    container_name: room-booking-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${DB_USER:-roomuser}:${DB_PASSWORD:-roompass}@postgres:5432/${DB_NAME:-roomdb}?sslmode=disable
    volumes:
      - ./internal/db/migrations:/migrations:ro 
    command: ["-path", "/migrations", "-database", "${DATABASE_URL:-postgres://roomuser:roompass@postgres:5432/roomdb?sslmode=disable}", "up"]
    networks:
      - room-booking-network
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: room-booking-api
    ports:
      - "8080:8080"
    environment:
      - APP_PORT=8080
      - APP_ENV=development
      - LOG_LEVEL=info
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-roomuser}
      - DB_PASSWORD=${DB_PASSWORD:-roompass}
      - DB_NAME=${DB_NAME:-roomdb}
      - DB_SSL_MODE=disable
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully 
    restart: unless-stopped
    networks:
      - room-booking-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  postgres_data:  

networks:
  room-booking-network:
    driver: bridge